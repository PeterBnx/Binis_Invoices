version: "3.9"

services:
  backend:
    container_name: binis_backend
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000 --settings=config.settings.dev
    volumes:
      - ./backend:/app
      - ./backend/db.sqlite3:/app/db.sqlite3
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - binis_network

  frontend:
    container_name: binis_frontend
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    env_file:
      - .env
    networks:
      - binis_network


networks:
  binis_network:
    driver: bridge