version: "3.9"

services:
  db:
    image: postgres:15
    container_name: binis_postgres
    ports:
      - "5432:5432"
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - binis_network

  backend:
    container_name: binis_backend
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000 --settings=config.settings.dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - binis_network

  frontend:
    container_name: binis_frontend
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - db
      - backend
    networks:
      - binis_network

volumes:
  postgres_data:

networks:
  binis_network:
    driver: bridge