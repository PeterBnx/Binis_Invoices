name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js (Version 22)
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Build Python Binary (PyInstaller)
        run: |
          pip install pyinstaller beautifulsoup4 playwright pandas requests python-dotenv
          python -m playwright install chromium
          pyinstaller --noconsole --onefile src/scripts/ipc.py

      - name: Install Node Dependencies
        run: npm install

      - name: Transpile Electron Main Process
        run: npm run transpile:electron

      - name: Build React UI Frontend
        run: npm run build

      - name: Build and Publish Electron Installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PASSWORD: ${{ secrets.PASSWORD }} 
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_USER_EMAIL: ${{ secrets.VITE_USER_EMAIL }}
        run: npm run publish