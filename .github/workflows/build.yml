name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js (Version 22)
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Build Python Binary (PyInstaller)
        run: |
          pip install pyinstaller beautifulsoup4 playwright pandas requests python-dotenv
          python -m playwright install chromium
          pyinstaller --noconsole --onefile src/scripts/ipc.py

      - name: Install Node Dependencies
        run: npm install

      - name: Build and Publish Electron Installer
        env:
          PASSWORD: ${{ secrets.PASSWORD }} 
        run: npm run publish